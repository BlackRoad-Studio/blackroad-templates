<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Navigation - BlackRoad</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gray-950: #0a0a0a;
            --gray-900: #171717;
            --gray-800: #262626;
            --gray-700: #404040;
            --gray-600: #525252;
            --gray-400: #a3a3a3;
            --gray-300: #d4d4d4;
            --gray-100: #f5f5f5;
            --accent-1: #ff8700;
            --accent-3: #ff0087;
            --accent-4: #af5fd7;
            --accent-6: #1e90ff;
            --success: #00d26a;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--gray-950);
            color: var(--gray-100);
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: var(--gray-900);
            border-right: 1px solid var(--gray-800);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        .sidebar-header {
            padding: 21px;
            border-bottom: 1px solid var(--gray-800);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 13px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .logo-text {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
        }
        .sidebar-search {
            padding: 13px 21px;
            border-bottom: 1px solid var(--gray-800);
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 13px;
            background: var(--gray-950);
            border: 1px solid var(--gray-700);
            border-radius: 10px;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--gray-100);
            font-family: var(--font-body);
            font-size: 13px;
            outline: none;
        }
        .search-box input::placeholder {
            color: var(--gray-600);
        }
        .search-kbd {
            padding: 3px 6px;
            background: var(--gray-800);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--gray-500);
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 13px;
        }
        .nav-section {
            margin-bottom: 21px;
        }
        .nav-section-title {
            padding: 8px 13px;
            font-size: 11px;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 10px 13px;
            border-radius: 10px;
            color: var(--gray-400);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .nav-item:hover {
            background: var(--gray-800);
            color: var(--gray-100);
        }
        .nav-item.active {
            background: rgba(255, 0, 135, 0.1);
            color: var(--accent-3);
        }
        .nav-item-icon {
            width: 20px;
            text-align: center;
        }
        .nav-item-text {
            flex: 1;
        }
        .nav-badge {
            padding: 2px 8px;
            background: var(--accent-3);
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }
        .nav-badge.warning {
            background: var(--accent-1);
        }
        .nav-badge.info {
            background: var(--accent-6);
        }
        .nav-item-expandable::after {
            content: '›';
            font-size: 16px;
            color: var(--gray-600);
            transition: transform 0.2s ease;
        }
        .nav-item-expandable.expanded::after {
            transform: rotate(90deg);
        }
        .nav-submenu {
            margin-left: 34px;
            border-left: 1px solid var(--gray-800);
            padding-left: 13px;
        }
        .nav-submenu .nav-item {
            padding: 8px 13px;
            font-size: 13px;
        }
        .sidebar-footer {
            padding: 13px;
            border-top: 1px solid var(--gray-800);
        }
        .user-card {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 10px 13px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .user-card:hover {
            background: var(--gray-800);
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .user-info {
            flex: 1;
        }
        .user-name {
            font-size: 14px;
            font-weight: 500;
        }
        .user-role {
            font-size: 12px;
            color: var(--gray-400);
        }
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }
        .main-content {
            flex: 1;
            padding: 55px;
        }
        .content-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .content-subtitle {
            color: var(--gray-400);
        }

        /* Collapsed sidebar variant */
        .sidebar-collapsed {
            width: 68px;
        }
        .sidebar-collapsed .sidebar-header,
        .sidebar-collapsed .sidebar-search,
        .sidebar-collapsed .nav-section-title,
        .sidebar-collapsed .nav-item-text,
        .sidebar-collapsed .nav-badge,
        .sidebar-collapsed .user-info,
        .sidebar-collapsed .logo-text {
            display: none;
        }
        .sidebar-collapsed .nav-item {
            justify-content: center;
            padding: 13px;
        }
        .sidebar-collapsed .nav-item-icon {
            width: auto;
            font-size: 20px;
        }
        .sidebar-collapsed .user-card {
            justify-content: center;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">🖤</div>
                <span class="logo-text">BlackRoad</span>
            </div>
        </div>
        
        <div class="sidebar-search">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" placeholder="Search...">
                <span class="search-kbd">⌘K</span>
            </div>
        </div>

        <nav class="sidebar-content">
            <div class="nav-section">
                <div class="nav-section-title">Main</div>
                <a href="#" class="nav-item active">
                    <span class="nav-item-icon">📊</span>
                    <span class="nav-item-text">Dashboard</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-item-icon">🤖</span>
                    <span class="nav-item-text">Agents</span>
                    <span class="nav-badge">847</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-item-icon">📦</span>
                    <span class="nav-item-text">Deployments</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-item-icon">📈</span>
                    <span class="nav-item-text">Analytics</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Infrastructure</div>
                <div class="nav-item nav-item-expandable expanded">
                    <span class="nav-item-icon">🌐</span>
                    <span class="nav-item-text">Regions</span>
                </div>
                <div class="nav-submenu">
                    <a href="#" class="nav-item">US East</a>
                    <a href="#" class="nav-item">EU West</a>
                    <a href="#" class="nav-item">Asia Pacific</a>
                </div>
                <a href="#" class="nav-item">
                    <span class="nav-item-icon">💾</span>
                    <span class="nav-item-text">Storage</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-item-icon">🔌</span>
                    <span class="nav-item-text">Integrations</span>
                    <span class="nav-badge warning">3</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Settings</div>
                <a href="#" class="nav-item">
                    <span class="nav-item-icon">⚙️</span>
                    <span class="nav-item-text">General</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-item-icon">🔐</span>
                    <span class="nav-item-text">Security</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-item-icon">👥</span>
                    <span class="nav-item-text">Team</span>
                    <span class="nav-badge info">New</span>
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">🚀</div>
                <div class="user-info">
                    <div class="user-name">Alexa</div>
                    <div class="user-role">Admin</div>
                </div>
                <div class="status-indicator"></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <h1 class="content-title">Dashboard</h1>
        <p class="content-subtitle">Welcome back! Here's what's happening with your agents.</p>
    </main>
</body>
</html>
