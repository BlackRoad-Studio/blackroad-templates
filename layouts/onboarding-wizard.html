<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Wizard - BlackRoad</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gray-950: #0a0a0a;
            --gray-900: #171717;
            --gray-800: #262626;
            --gray-700: #404040;
            --gray-600: #525252;
            --gray-400: #a3a3a3;
            --gray-300: #d4d4d4;
            --gray-100: #f5f5f5;
            --accent-1: #ff8700;
            --accent-2: #ff5f00;
            --accent-3: #ff0087;
            --accent-4: #af5fd7;
            --accent-5: #5f5fff;
            --accent-6: #1e90ff;
            --success: #00d26a;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--gray-950);
            color: var(--gray-100);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 34px;
        }
        .wizard-container {
            width: 100%;
            max-width: 600px;
        }
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 55px;
            position: relative;
        }
        .progress-bar::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 40px;
            right: 40px;
            height: 2px;
            background: var(--gray-800);
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 40px;
            width: calc((100% - 80px) * var(--progress, 0));
            height: 2px;
            background: linear-gradient(90deg, var(--accent-3), var(--accent-4));
            transition: width 0.5s ease;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 13px;
            z-index: 1;
        }
        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gray-900);
            border: 2px solid var(--gray-700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .step.completed .step-number {
            background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
            border-color: transparent;
        }
        .step.active .step-number {
            border-color: var(--accent-3);
            box-shadow: 0 0 20px rgba(255, 0, 135, 0.3);
        }
        .step-label {
            font-size: 12px;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .step.active .step-label,
        .step.completed .step-label {
            color: var(--gray-100);
        }
        .wizard-card {
            background: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 21px;
            padding: 55px;
        }
        .wizard-step {
            display: none;
        }
        .wizard-step.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(13px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .step-icon {
            width: 89px;
            height: 89px;
            border-radius: 21px;
            background: linear-gradient(135deg, rgba(255, 0, 135, 0.1), rgba(175, 95, 215, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            margin-bottom: 34px;
        }
        .step-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 13px;
        }
        .step-description {
            color: var(--gray-400);
            line-height: 1.6;
            margin-bottom: 34px;
        }
        .form-group {
            margin-bottom: 21px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-300);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 13px 21px;
            background: var(--gray-950);
            border: 1px solid var(--gray-700);
            border-radius: 13px;
            color: var(--gray-100);
            font-family: var(--font-body);
            font-size: 15px;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-3);
            box-shadow: 0 0 0 3px rgba(255, 0, 135, 0.1);
        }
        .form-input::placeholder {
            color: var(--gray-600);
        }
        .select-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 13px;
        }
        .select-option {
            padding: 21px;
            background: var(--gray-950);
            border: 1px solid var(--gray-700);
            border-radius: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .select-option:hover {
            border-color: var(--gray-600);
        }
        .select-option.selected {
            border-color: var(--accent-3);
            background: rgba(255, 0, 135, 0.05);
        }
        .select-option-icon {
            font-size: 28px;
            margin-bottom: 13px;
        }
        .select-option-label {
            font-weight: 500;
            margin-bottom: 5px;
        }
        .select-option-desc {
            font-size: 12px;
            color: var(--gray-400);
        }
        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 21px;
            padding: 21px;
            background: var(--gray-950);
            border: 2px dashed var(--gray-700);
            border-radius: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .avatar-upload:hover {
            border-color: var(--accent-3);
        }
        .avatar-preview {
            width: 89px;
            height: 89px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
        }
        .avatar-text h4 {
            font-family: var(--font-display);
            margin-bottom: 5px;
        }
        .avatar-text p {
            font-size: 13px;
            color: var(--gray-400);
        }
        .wizard-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 34px;
            padding-top: 34px;
            border-top: 1px solid var(--gray-800);
        }
        .btn {
            padding: 13px 34px;
            border-radius: 13px;
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--gray-700);
            color: var(--gray-300);
        }
        .btn-secondary:hover {
            border-color: var(--gray-500);
            color: var(--gray-100);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-3), var(--accent-4));
            border: none;
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 135, 0.3);
        }
        .success-animation {
            text-align: center;
        }
        .success-icon {
            width: 89px;
            height: 89px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--success), #00b35a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 34px;
            animation: popIn 0.5s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s ease-in-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(400px) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="wizard-container">
        <div class="progress-bar" style="--progress: 0.33">
            <div class="step completed">
                <div class="step-number">✓</div>
                <span class="step-label">Account</span>
            </div>
            <div class="step active">
                <div class="step-number">2</div>
                <span class="step-label">Profile</span>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <span class="step-label">Workspace</span>
            </div>
            <div class="step">
                <div class="step-number">4</div>
                <span class="step-label">Complete</span>
            </div>
        </div>

        <div class="wizard-card">
            <!-- Step 2: Profile -->
            <div class="wizard-step active">
                <div class="step-icon">👤</div>
                <h2 class="step-title">Set up your profile</h2>
                <p class="step-description">Tell us a bit about yourself. This helps personalize your BlackRoad experience.</p>
                
                <div class="avatar-upload">
                    <div class="avatar-preview">📷</div>
                    <div class="avatar-text">
                        <h4>Upload avatar</h4>
                        <p>PNG, JPG up to 5MB</p>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 21px;">
                    <label class="form-label">Display Name</label>
                    <input type="text" class="form-input" placeholder="How should we call you?">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <input type="text" class="form-input" placeholder="e.g., Developer, Designer, Founder">
                </div>

                <div class="wizard-actions">
                    <button class="btn btn-secondary">← Back</button>
                    <button class="btn btn-primary">Continue →</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
